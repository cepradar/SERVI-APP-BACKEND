# Configuración de fuentes para JasperReports
# Asegura compatibilidad con caracteres en español (ñ, acentos, etc.)

net.sf.jasperreports.default.font.name=SansSerif
net.sf.jasperreports.default.pdf.font.name=Helvetica
net.sf.jasperreports.default.pdf.encoding=Cp1252
net.sf.jasperreports.default.pdf.embedded=true

# Evitar advertencias de extensiones no encontradas
net.sf.jasperreports.extension.registry.factory.simple.font.families=net.sf.jasperreports.engine.fonts.SimpleFontExtensionsRegistryFactory
