spring.application.name=inventory-backend

# ============================================================
# CORS — orígenes permitidos (separados por coma)
# Override con variable de entorno APP_CORS_ORIGINS en producción.
# ============================================================
app.cors.allowed-origin-patterns=${APP_CORS_ORIGINS:http://localhost:5173,http://192.168.1.9:5173,http://127.0.0.1:5173,https://stephen-wallet-share-affiliated.trycloudflare.com}

# ============================================================
# CARGA DE CONFIGURACIÓN EXTERNA (opcional)
# ============================================================
spring.config.import=optional:file:./.env[.properties],optional:file:./config/application.properties

# ============================================================
# DATASOURCE — PostgreSQL
# Variables de entorno: DB_URL, DB_USER, DB_PASSWORD
# ============================================================
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/SERVI}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}

# ============================================================
# JPA / Hibernate
# En producción cambiar ddl-auto a "validate" o "none"
# ============================================================
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# FLYWAY — Migraciones de base de datos
# baseline-on-migrate=true permite Flyway arrancar en una BD
# ya existente (creada con ddl-auto=update) sin fallar.
# ============================================================
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=2
spring.flyway.locations=classpath:db/migration

# ============================================================
# JWT
# Variables de entorno: JWT_SECRET, JWT_EXPIRATION_MS
# ============================================================
jwt.secret=${JWT_SECRET:V/Yw70P*V-?eEqV=C2x^F6%r@3*?[K_G<Wop,B6>@0@AENj-Z(wYv;.{Jna:/<N%?Vn9b*;:tJJt;_%.=Zw]@;}
jwt.expiration=${JWT_EXPIRATION_MS:36000000}

# ============================================================
# SERVIDOR
# ============================================================
server.port=${SERVER_PORT:8080}

# ============================================================
# MULTIPART (uploads)
# ============================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================================
# ALMACENAMIENTO DE REPORTES
# ============================================================
reports.storage.path=${REPORTS_STORAGE_PATH:./reports-storage}

# ============================================================
# LOGGING
# ============================================================
logging.level.com.inventory=INFO
spring.devtools.restart.enabled=false

